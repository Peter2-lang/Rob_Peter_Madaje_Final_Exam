
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records</title>
    <link href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navigation Menu -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#" onclick="showHome()">Student Portal</a>
            <div class="navbar-nav">
                <a class="nav-link" href="#" onclick="showHome()">Home (View All)</a>
                <a class="nav-link" href="#" onclick="showForm()">Add Student</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        
        <!-- Homepage / Student List Table -->
        <div id="list-section">
            <h3>Student Directory</h3>
            <table class="table table-striped table-bordered mt-3 bg-white">
                <thead class="table-dark">
                    <tr>
                        <th>Student ID</th>
                        <th>Full Name</th>
                        <th>Course</th>
                        <th>Year Level</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="student-table-body">
                    <!-- Data will be populated here -->
                </tbody>
            </table>
        </div>

        <!-- Student Registration / Edit Form -->
        <div id="form-section" style="display: none;">
            <h3 id="form-title">Register New Student</h3>
            <div class="card mt-3">
                <div class="card-body">
                    <form id="student-form" onsubmit="handleFormSubmit(event)">
                        <input type="hidden" id="db_id">
                        
                        <div class="mb-3">
                            <label>Student ID</label>
                            <input type="text" id="student_id" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Full Name</label>
                            <input type="text" id="full_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Course</label>
                            <input type="text" id="course" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Year Level</label>
                            <select id="year_level" class="form-control" required>
                                <option value="">Select Year...</option>
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>Email Address</label>
                            <input type="email" id="email" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Student</button>
                        <button type="button" class="btn btn-secondary" onclick="showHome()">Cancel</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <!-- Frontend Logic -->
    <script>
        const API_URL = '/api/students';

        // Navigation logic
        function showHome() {
            document.getElementById('list-section').style.display = 'block';
            document.getElementById('form-section').style.display = 'none';
            fetchStudents();
        }

        function showForm(student = null) {
            document.getElementById('list-section').style.display = 'none';
            document.getElementById('form-section').style.display = 'block';
            
            const form = document.getElementById('student-form');
            if (student) {
                document.getElementById('form-title').innerText = 'Edit Student Information';
                document.getElementById('db_id').value = student.id;
                document.getElementById('student_id').value = student.student_id;
                document.getElementById('full_name').value = student.full_name;
                document.getElementById('course').value = student.course;
                document.getElementById('year_level').value = student.year_level;
                document.getElementById('email').value = student.email;
            } else {
                document.getElementById('form-title').innerText = 'Register New Student';
                form.reset();
                document.getElementById('db_id').value = '';
            }
        }

        // Fetch and display Read (GET)
        async function fetchStudents() {
            const response = await fetch(API_URL);
            const students = await response.json();
            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = '';

            students.forEach(student => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${student.student_id}</td>
                    <td>${student.full_name}</td>
                    <td>${student.course}</td>
                    <td>${student.year_level}</td>
                    <td>${student.email}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick='editStudent(${JSON.stringify(student)})'>Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteStudent(${student.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Form Submit Create/Update (POST/PUT)
        async function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('db_id').value;
            
            const studentData = {
                student_id: document.getElementById('student_id').value,
                full_name: document.getElementById('full_name').value,
                course: document.getElementById('course').value,
                year_level: document.getElementById('year_level').value,
                email: document.getElementById('email').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/${id}` : API_URL;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(studentData)
                });

                if(response.ok) {
                    showHome();
                } else {
                    alert("Error saving record.");
                }
            } catch (err) {
                console.error(err);
            }
        }

        // Setup Edit
        function editStudent(student) {
            showForm(student);
        }

        // Delete (DELETE)
        async function deleteStudent(id) {
            if (confirm("Are you sure you want to delete this record?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchStudents();
            }
        }

        // Initial Load
        fetchStudents();
    </script>
</body>
</html>
